apis:
  - name: EVgo Inside API
    description: >
      The EVgo Inside partner integration API allows third-party apps —
      including automaker head units, fleet management platforms, and mobile
      apps — to embed EVgo's full charging workflow. Capabilities include
      new account registration, linking existing EVgo accounts, locating
      nearby DC fast chargers, checking real-time charger availability,
      initiating and stopping charging sessions, and handling payment.
      Access is granted through a commercial partnership agreement rather
      than a public self-serve portal.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.evgo.com/charging-solutions/business-and-commercial/evgo-inside/
    baseURL: https://api.evgo.com
    tags:
      - EV Charging
      - Charging Sessions
      - Station Availability
      - Account Management
      - Partner Integration
    properties:
