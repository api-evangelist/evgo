  - name: PlugShare Station Data API
    description: >
      The PlugShare Charging Stations API, operated by EVgo (which acquired
      Recargo/PlugShare in 2021), provides deep and comprehensive public
      charging location data drawn from charge point operators, industry
      partners, and crowdsourced EV driver contributions. The API serves
      millions of requests per month and powers mobile apps, in-vehicle
      navigation systems, kiosks, and public displays for major automakers,
      utilities, and EV industry stakeholders. Access is limited to
      commercial licenses for EV industry partners.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.plugshare.com/
    baseURL: https://api.plugshare.com
    tags:
