name: EVgo
description: >
  EVgo is one of the largest public DC fast charging networks in the United
  States, operating over 1,100 fast charging locations across 47 states.
  EVgo provides REST APIs through its EVgo Inside partner integration
  platform, enabling automakers, fleet operators, and app developers to
  embed charging station discovery, real-time availability, session
  initiation, account creation, and payment processing directly into their
  own branded experiences. Charging station data is also served via the
  PlugShare API, which EVgo owns and operates.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Electric Vehicles
  - EV Charging
  - Charging Stations
  - Energy
  - Transportation
  - Mobility
